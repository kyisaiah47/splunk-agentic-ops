<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Splunk Agentic Ops</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #d4d4d4;
    font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  header {
    background: #111827;
    border-bottom: 1px solid #1f2937;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo h1 { font-size: 18px; font-weight: 600; color: #f9fafb; }
  .logo span { font-size: 12px; color: #6b7280; margin-left: 8px; }

  .trigger-btn {
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .trigger-btn:hover { background: #4f46e5; }
  .trigger-btn:disabled { background: #374151; cursor: not-allowed; }

  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 20px 24px;
  }

  .stat-card .label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 32px; font-weight: 700; color: #f9fafb; margin-top: 4px; }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }

  .investigations { display: flex; flex-direction: column; gap: 12px; }

  .inv-card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 20px 24px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .inv-card:hover { border-color: #374151; background: #161f2e; }
  .inv-card.expanded { border-color: #6366f1; }

  .inv-header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sev-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .sev-dot.critical { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
  .sev-dot.high     { background: #f97316; box-shadow: 0 0 8px #f97316; }
  .sev-dot.medium   { background: #eab308; }
  .sev-dot.low      { background: #6b7280; }

  .inv-name { font-size: 15px; font-weight: 600; color: #f9fafb; flex: 1; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge.running  { background: #1d4ed8; color: #bfdbfe; animation: pulse 1.5s infinite; }
  .badge.completed { background: #065f46; color: #6ee7b7; }
  .badge.failed   { background: #7f1d1d; color: #fca5a5; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .inv-meta {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    font-size: 12px;
    color: #6b7280;
  }

  .inv-detail {
    display: none;
    margin-top: 20px;
    border-top: 1px solid #1f2937;
    padding-top: 20px;
  }

  .inv-detail.visible { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .detail-block { }
  .detail-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .detail-value { font-size: 14px; color: #e5e7eb; line-height: 1.5; }

  .conf-bar {
    height: 6px;
    background: #1f2937;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 6px;
    width: 160px;
  }

  .conf-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    transition: width 0.5s ease;
  }

  .summary-box {
    background: #0d1117;
    border: 1px solid #1f2937;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    color: #d1d5db;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .rec-box {
    background: #0a2a1a;
    border: 1px solid #065f46;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    color: #6ee7b7;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .evidence-list { display: flex; flex-direction: column; gap: 6px; }

  .evidence-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12px;
    color: #6b7280;
  }

  .ev-tag {
    background: #1f2937;
    color: #9ca3af;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .hosts-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }

  .host-tag {
    background: #1e3a5f;
    color: #93c5fd;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: monospace;
  }

  .empty {
    text-align: center;
    padding: 60px;
    color: #4b5563;
    font-size: 14px;
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }

  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: #111827;
    border: 1px solid #374151;
    border-radius: 16px;
    padding: 32px;
    width: 420px;
  }
  .modal h2 { font-size: 18px; color: #f9fafb; margin-bottom: 20px; }
  .modal-btns { display: flex; flex-direction: column; gap: 10px; }
  .modal-btn {
    background: #1f2937;
    border: 1px solid #374151;
    color: #e5e7eb;
    border-radius: 8px;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }
  .modal-btn:hover { background: #374151; }
  .modal-btn .btn-title { font-weight: 600; margin-bottom: 2px; }
  .modal-btn .btn-desc { font-size: 12px; color: #6b7280; }
  .modal-cancel {
    margin-top: 8px;
    width: 100%;
    background: transparent;
    border: none;
    color: #6b7280;
    cursor: pointer;
    font-size: 14px;
    padding: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Splunk Agentic Ops</h1>
    <span>Autonomous Incident Investigator</span>
  </div>
  <button class="trigger-btn" onclick="showModal()">+ Trigger Alert</button>
</header>

<main>
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Investigations</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Completed</div>
      <div class="value" id="stat-completed">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Avg Confidence</div>
      <div class="value" id="stat-confidence">—</div>
    </div>
  </div>

  <div class="section-title">Investigations</div>
  <div class="investigations" id="investigations">
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <div>No investigations yet — trigger an alert to get started</div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Trigger a Demo Alert</h2>
    <div class="modal-btns">
      <button class="modal-btn" onclick="triggerAlert('5xx_spike')">
        <div class="btn-title">🔴 High 5xx Error Rate</div>
        <div class="btn-desc">500/503 spike on web-03 and web-07 — bad deployment scenario</div>
      </button>
      <button class="modal-btn" onclick="triggerAlert('latency')">
        <div class="btn-title">🟡 P99 Latency SLO Breach</div>
        <div class="btn-desc">Response times exceed 2s across all hosts</div>
      </button>
      <button class="modal-btn" onclick="triggerAlert('db_connections')">
        <div class="btn-title">🔴 Database Connection Exhausted</div>
        <div class="btn-desc">Connection pool full — cascading failure risk</div>
      </button>
    </div>
    <button class="modal-cancel" onclick="hideModal()">Cancel</button>
  </div>
</div>

<script>
let expanded = new Set();
let polling = true;

async function fetchInvestigations() {
  const res = await fetch('/investigations');
  return res.json();
}

async function triggerAlert(type) {
  hideModal();
  const payloads = {
    '5xx_spike': {
      alert_name: 'High 5xx Error Rate — Web Tier',
      search_query: 'index=web_logs status>=500 | stats count by host',
      severity: 'high',
      trigger_time: new Date().toISOString(),
      trigger_reason: { type: 'threshold', value: '847 errors', condition: '> 50 per host in 15 min' }
    },
    'latency': {
      alert_name: 'P99 Latency Exceeds SLO (>2s)',
      search_query: 'index=web_logs | rex field=_raw "(?P<ms>\\d+)ms$" | eventstats p99(ms) as p99 | where p99>2000',
      severity: 'high',
      trigger_time: new Date().toISOString(),
      trigger_reason: { type: 'p99 latency', value: '4823ms', condition: '> 2000ms' }
    },
    'db_connections': {
      alert_name: 'Database Connection Pool Exhausted',
      search_query: 'index=app_logs "connection pool exhausted" | stats count by host',
      severity: 'critical',
      trigger_time: new Date().toISOString(),
      trigger_reason: { type: 'threshold', value: '245 events', condition: '> 10' }
    }
  };

  await fetch('/webhook/splunk', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payloads[type])
  });
}

function showModal() { document.getElementById('modal').classList.add('visible'); }
function hideModal() { document.getElementById('modal').classList.remove('visible'); }

function sevClass(sev) {
  return (sev || '').toLowerCase().replace('critical','critical').replace('high','high').replace('medium','medium') || 'low';
}

function timeSince(iso) {
  const secs = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (secs < 60) return `${secs}s ago`;
  if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
  return `${Math.floor(secs/3600)}h ago`;
}

function duration(inv) {
  if (!inv.completed_at) return '';
  const ms = new Date(inv.completed_at) - new Date(inv.started_at);
  return `${Math.round(ms/1000)}s investigation`;
}

function renderInvestigations(invs) {
  const container = document.getElementById('investigations');
  if (!invs.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>No investigations yet — trigger an alert to get started</div></div>';
    return;
  }

  const total = invs.length;
  const completed = invs.filter(i => i.status === 'completed').length;
  const avgConf = invs.filter(i => i.confidence > 0).reduce((s,i) => s + i.confidence, 0) / (completed || 1);

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-completed').textContent = completed;
  document.getElementById('stat-confidence').textContent = completed ? Math.round(avgConf * 100) + '%' : '—';

  container.innerHTML = invs.map(inv => {
    const isExpanded = expanded.has(inv.id);
    const hosts = (inv.affected_hosts || []).map(h => `<span class="host-tag">${h}</span>`).join('') || '<span style="color:#4b5563">Investigating…</span>';
    const evidence = (inv.evidence || []).slice(0, 6).map(e =>
      `<div class="evidence-item"><span class="ev-tag">${e.tool}</span><span>${Object.values(e.query||{})[0]||''}...</span></div>`
    ).join('');

    return `
    <div class="inv-card ${isExpanded ? 'expanded' : ''}" onclick="toggleExpand('${inv.id}')">
      <div class="inv-header">
        <div class="sev-dot ${sevClass(inv.severity)}"></div>
        <div class="inv-name">${inv.alert_name}</div>
        <span class="badge ${inv.status}">${inv.status}</span>
      </div>
      <div class="inv-meta">
        <span>ID: ${inv.id}</span>
        <span>${timeSince(inv.started_at)}</span>
        ${inv.completed_at ? `<span>${duration(inv)}</span>` : ''}
        ${inv.confidence > 0 ? `<span>${Math.round(inv.confidence*100)}% confidence</span>` : ''}
      </div>
      <div class="inv-detail ${isExpanded ? 'visible' : ''}">
        ${inv.root_cause ? `
        <div class="summary-box"><strong>Root Cause:</strong> ${inv.root_cause}</div>
        ` : ''}
        <div class="detail-grid">
          <div class="detail-block">
            <div class="detail-label">Confidence</div>
            <div class="detail-value">${Math.round((inv.confidence||0)*100)}%
              <div class="conf-bar"><div class="conf-fill" style="width:${Math.round((inv.confidence||0)*100)}%"></div></div>
            </div>
          </div>
          <div class="detail-block">
            <div class="detail-label">First Seen</div>
            <div class="detail-value">${inv.first_seen || '—'}</div>
          </div>
          <div class="detail-block" style="grid-column:1/-1">
            <div class="detail-label">Affected Hosts</div>
            <div class="hosts-list">${hosts}</div>
          </div>
        </div>
        ${inv.summary ? `<div class="summary-box">${inv.summary}</div>` : ''}
        ${inv.recommendation ? `<div class="rec-box">✅ ${inv.recommendation}</div>` : ''}
        ${evidence ? `
        <div class="detail-label" style="margin-bottom:8px">Evidence (${(inv.evidence||[]).length} queries)</div>
        <div class="evidence-list">${evidence}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(id) {
  if (expanded.has(id)) expanded.delete(id);
  else expanded.add(id);
}

async function poll() {
  try {
    const invs = await fetchInvestigations();
    renderInvestigations(invs);
    const anyRunning = invs.some(i => i.status === 'running');
    setTimeout(poll, anyRunning ? 2000 : 5000);
  } catch(e) {
    setTimeout(poll, 5000);
  }
}

poll();
</script>
</body>
</html>
